name: 04 - Using Actions
on:
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # - name: Printing Folders
      #  run: ls -R
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
      - name: Install Dependencies
        working-directory: react-app
        run: npm ci
      - name: Run Unit Tests
        working-directory: react-app
        run: npm run test