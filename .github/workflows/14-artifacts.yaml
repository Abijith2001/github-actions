name: 14 - Working with Artifacts
run-name: 14 - Working with Artifacts run-name
env:
  build-artifact-key: app-${{ github.sha }}
  test-coverage-key: test-coverage-${{ github.sha }}
on:
  workflow_dispatch:
jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download cached dependencies
        id: cache
        uses: actions/cache@v3
        with:
          key: deps-node-modules-${{ hashFiles('./react-app/package-lock.json') }}
          path: ./react-app/node_modules
      - name: Install dependencies
        if: ${{ steps.cache.outputs.cache-hit == 'false' || steps.cache.outputs.cache-hit == ''}}
        run: npm ci
      - name: Unit tests
        run: npm run test -- --coverage
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.test-coverage-key }}
          path: ./react-app/coverage
      - name: Build code
        run: npm run build
      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.build-artifact-key }}
          path: ./react-app/build/
  deploy:
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: PWD
        run: |
              pwd
              ls -R
      - name: Download build files
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.build-artifact-key }}
          path: ./build
      - name: Show folder structure
        run: ls -R
  
