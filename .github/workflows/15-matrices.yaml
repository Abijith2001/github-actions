name: 15 - Working with Matrices
on:
  workflow_dispatch
jobs:
  backwards-compatibility:
    name: ${{ matrix.os }}-${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node:
          - 18
          - 20
          - 21
        os:
          - ubuntu-latest
          - windows-latest
        include:
          - node: 16
            os: ubuntu-latest
          - node: 21
            os: ubuntu-latest
            tag: experimental
         
    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node}}
      - name: Fail if experimental
        if: ${{ matrix.tag == 'experimental' }}
        run: exit 1
      - name: Perform some tests
        run: |
              echo "Running tests on OS ${{matrix.os}} and NodeJS ${{matrix.node}}"
              sleep 10
      - name: Upload test results
        run: echo "Uploading test results"
  include-example:
    name: ${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        color:
          -  red
          -  green
        shape:
          -  circle
          -  square
        size:
          -  small
          -  large
        include:
          - color: red
            shape: triangle
    steps:
      - name: Dummy
        run: echo "${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size }}"
            
